services:
  - type: web
    name: newsletter-ai-backend
    runtime: python
    plan: free
    buildCommand: "pip install --upgrade pip && pip install -r NewsletterAiAgent/requirements.txt"
    startCommand: "PYTHONPATH=NewsletterAiAgent/src/ python -m uvicorn NewsletterAiAgent.api.main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.0
      - key: LLM_PROVIDER
        value: ollama
      - key: OLLAMA_HOST
        value: https://ollama.com
      - key: OLLAMA_MODEL
        value: gemma4:31b-cloud
      - key: OLLAMA_API_KEY
        sync: false
      - key: TAVILY_API_KEY
        sync: false
      - key: SMTP_HOST
        value: smtp.gmail.com
      - key: SMTP_PORT
        value: 587
      - key: SMTP_USERNAME
        sync: false
      - key: SMTP_PASSWORD
        sync: false
      - key: IMAP_HOST
        value: imap.gmail.com
      - key: IMAP_PORT
        value: 993
      - key: IMAP_USERNAME
        sync: false
      - key: IMAP_PASSWORD
        sync: false
      - key: FROM_EMAIL
        sync: false
      - key: FROM_NAME
        value: TARS Group
      - key: RECIPIENTS
        sync: false
      - key: POLL_INTERVAL
        value: 30
      - key: POLL_TIMEOUT
        value: 20
    healthCheckPath: /status

  - type: static
    name: newsletter-ai-frontend
    repo: https://github.com/muraliikrishnant/NewsletterAIAgent_Tars
    branch: main
    buildCommand: ""
    publishPath: NewsletterAiAgent/frontend
    plan: free

